<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SiteSnap</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <!--
    Audit issue #10 — Theme preference must apply before first paint.
    This synchronous script reads localStorage and sets [data-theme] on <html>
    BEFORE Angular boots, preventing the dark-mode flicker on reload.
  -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('sitesnap_theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {
          // localStorage may be unavailable in private browsing — silently ignore.
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
