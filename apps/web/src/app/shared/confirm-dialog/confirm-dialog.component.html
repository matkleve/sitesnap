<div class="dialog-overlay" role="dialog" aria-modal="true" [attr.aria-label]="title()">
  <div class="dialog">
    <h2 class="dialog__title">{{ title() }}</h2>
    <p class="dialog__body">{{ message() }}</p>
    <div class="dialog__actions">
      <button class="dialog__cancel" type="button" (click)="cancelled.emit()">
        {{ cancelLabel() }}
      </button>
      <button
        class="dialog__confirm"
        [class.dialog__confirm--danger]="danger()"
        type="button"
        (click)="confirmed.emit()"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
