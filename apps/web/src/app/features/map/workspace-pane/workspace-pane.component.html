<!-- Workspace Pane — right panel (desktop), bottom sheet (mobile, future) -->
<div class="workspace-pane ui-container" role="region" aria-label="Workspace pane">
  <app-pane-header (close)="close()"></app-pane-header>
  <app-group-tab-bar
    [activeTabId]="activeTabId()"
    (tabChange)="onTabChange($event)"
  ></app-group-tab-bar>
  <app-sorting-controls></app-sorting-controls>

  @if (detailImageId()) {
    <app-image-detail-view
      [imageId]="detailImageId()"
      (closed)="onDetailClose()"
      (editLocationRequested)="onEditLocation($event)"
    />
  } @else {
    <app-thumbnail-grid
      [activeTabId]="activeTabId()"
      [activeClusterImageIds]="activeClusterImageIds()"
    />
  }
</div>
